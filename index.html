<!DOCTYPE html>

  <title>김민경 웹 명함</title>
  <link rel="stylesheet" href="style.css" />

<body>
  <main class="card">
    <div class="profile-image">
      <img src="./samsung.jpg" alt="프로필 이미지" />

    <section class="intro">
      <p class="eyebrow">GAME BUSINESS PM</p>
      <h1 class="name">김민경</h1>
      <p class="role">게임 서비스를 성장시키는 사업PM</p>
      <p class="description">
        커뮤니케이션과 데이터를 바탕으로 유저 경험과 사업 성과를 연결합니다.
      </p>
    </section>

    <section class="section">
      <h2 class="section-title">Core Skills</h2>
      <div class="skill-list">
        <span>사업 기획</span>
        <span>라이브 운영</span>
        <span>데이터 분석</span>
        <span>이벤트 기획</span>
      </div>

    <section class="section">
      <h2 class="section-title">Interest</h2>
      <div class="interest-list">
        <span>라이브 서비스</span>
        <span>유저 리텐션</span>
        <span>BM 설계</span>
      </div>
    </section>

    <section class="contact-list" aria-label="연락처 정보">
      <div class="contact-item">
        <div class="contact-info">
          <span class="label">Email</span>
          <a class="value" href="mailto:mk.minnie.kim61@gmail.com">
            mk.minnie.kim61@gmail.com
          </a>
        </div>

        <button class="copy-button" type="button" data-copy="mk.minnie.kim61@gmail.com">
          이메일 복사
        </button>
      </div>

      <div class="contact-item">
        <div class="contact-info">
          <span class="label">Phone</span>
          <a class="value" href="tel:01042643395">
            010-4264-3395
          </a>
        </div>

        <button class="copy-button" type="button" data-copy="010-4264-3395">
          번호 복사
        </button>
      </div>

      <div class="contact-item">
        <div class="contact-info">
          <span class="label">Portfolio</span>
          <a class="value" href="#" target="_blank" rel="noopener noreferrer">
            포트폴리오 링크를 입력하세요

        </div>

        <button class="copy-button" type="button" data-copy="포트폴리오 링크를 입력하세요">
          링크 복사
        </button>
